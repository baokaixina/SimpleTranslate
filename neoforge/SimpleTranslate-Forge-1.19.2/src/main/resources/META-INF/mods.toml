modLoader="javafml"
loaderVersion="[43,)"
license="${mod_license}"
clientSideOnly=false
showAsResourcePack=false

[[mods]]
modId="${mod_id}"
version="${version}"
displayName="${mod_name}"
authors="${mod_authors}"
logoFile="assets/simple_translate/icon.png"
description='''${mod_description}'''
displayTest="IGNORE_SERVER_VERSION"

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="[${forge_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="[${minecraft_version},1.19.3)"
ordering="NONE"
side="BOTH"
